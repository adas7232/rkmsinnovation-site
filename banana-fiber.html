<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banana Fiber — RKMS Innovation</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:      #2563eb;
      --blue-dark: #1d4ed8;
      --green:     #16a34a;
      --green-dim: rgba(22,163,74,0.08);
      --text:      #111827;
      --muted:     #6b7280;
      --border:    #e5e7eb;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: var(--text); -webkit-font-smoothing: antialiased; }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--blue);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.back { font-size: 13px; }

    /* HERO */
    .hero {
      max-width: 780px;
      margin: 0 auto;
      padding: 80px 48px 72px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 20px;
      color: #0f172a;
    }
    .hero h1 em { font-style: italic; color: var(--green); }
    .hero-sub {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 540px;
    }

    /* SECTIONS */
    section {
      max-width: 780px;
      margin: 0 auto;
      padding: 64px 48px;
      border-top: 1px solid var(--border);
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 28px;
    }

    /* MISSION */
    .mission-text {
      font-size: 19px;
      line-height: 1.75;
      color: #1f2937;
      font-weight: 300;
    }
    .mission-text em { font-style: italic; color: var(--green); font-weight: 400; }

    /* PRODUCTS */
    .products-grid { display: grid; gap: 20px; }
    .product-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 32px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {
      border-color: var(--green);
      box-shadow: 0 4px 20px rgba(22,163,74,0.07);
    }
    .product-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-dim);
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 14px;
    }
    .product-card h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #0f172a;
    }

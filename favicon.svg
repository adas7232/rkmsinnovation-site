  </defs>
  <rect width="32" height="32" rx="6" fill="url(#sky)"/>
  <rect x="0" y="19" width="32" height="13" rx="0" fill="url(#water)"/>
  <line x1="0" y1="19" x2="32" y2="19" stroke="#fde68a" stroke-width="0.6" stroke-opacity="0.6"/>
  <circle cx="16" cy="19" r="5" fill="#fde047" clip-path="url(#sunclip)"/>
  <circle cx="16" cy="19" r="3.5" fill="#fbbf24" clip-path="url(#sunclip)"/>
  <ellipse cx="16" cy="22.5" rx="2" ry="3" fill="#fbbf24" opacity="0.3"/>
  <line x1="4"  y1="23" x2="10" y2="23" stroke="#fde68a" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="22" y1="23" x2="28" y2="23" stroke="#fde68a" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="6"  y1="26" x2="10" y2="26" stroke="#fde68a" stroke-width="0.4" stroke-opacity="0.2"/>
  <line x1="22" y1="26" x2="26" y2="26" stroke="#fde68a" stroke-width="0.4" stroke-opacity="0.2"/>
</svg>
